---
# Pack role tasks – executed at AMI bake time by Packer.

# ---------------------------------------------------------------------------
# 1. System updates & dependency installation
# ---------------------------------------------------------------------------

- name: Update all system packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_only: true
  tags: [pack, packages]

- name: Install required packages
  ansible.builtin.dnf:
    name:
      - nginx
      - python3
      - python3-pip
      - ansible
      - jq
      - curl
    state: present
  tags: [pack, packages]

# ---------------------------------------------------------------------------
# 2. Nginx static page
# ---------------------------------------------------------------------------

- name: Ensure nginx html directory exists
  ansible.builtin.file:
    path: "{{ nginx_html_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [pack, nginx]

- name: Deploy default static HTML page
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ nginx_html_dir }}/index.html"
    owner: root
    group: root
    mode: "0644"
  tags: [pack, nginx]

- name: Deploy nginx virtual-host configuration
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/roadpass.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx
  tags: [pack, nginx]

- name: Remove default nginx welcome page if present
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: reload nginx
  tags: [pack, nginx]

# ---------------------------------------------------------------------------
# 3. Enable & start nginx
# ---------------------------------------------------------------------------

- name: Enable and start nginx service
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
  tags: [pack, nginx]

# ---------------------------------------------------------------------------
# 4. Stage the fry playbook / roles on the AMI for launch-time execution
# ---------------------------------------------------------------------------

- name: Create fry base directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ fry_base_dir }}"
    - "{{ fry_base_dir }}/playbooks"
    - "{{ fry_roles_dir }}"
  tags: [pack, fry-stage]

- name: Stage fry ansible.cfg
  ansible.builtin.copy:
    dest: "{{ fry_ansible_cfg }}"
    content: |
      [defaults]
      roles_path            = {{ fry_roles_dir }}
      host_key_checking     = False
      retry_files_enabled   = False
      interpreter_python    = auto_silent
      stdout_callback       = yaml
      display_skipped_hosts = False

      [ssh_connection]
      pipelining = True
    owner: root
    group: root
    mode: "0644"
  tags: [pack, fry-stage]

- name: Stage fry playbook
  ansible.builtin.copy:
    dest: "{{ fry_playbook }}"
    content: |
      ---
      # Fry playbook – apply runtime config from EC2 user-data
      - name: Fry – apply runtime configuration from EC2 user-data
        hosts: localhost
        connection: local
        become: true
        gather_facts: true
        roles:
          - role: fry
    owner: root
    group: root
    mode: "0644"
  tags: [pack, fry-stage]

- name: Create fry role directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ fry_roles_dir }}/fry"
    - "{{ fry_roles_dir }}/fry/tasks"
    - "{{ fry_roles_dir }}/fry/handlers"
    - "{{ fry_roles_dir }}/fry/defaults"
    - "{{ fry_roles_dir }}/fry/templates"
  tags: [pack, fry-stage]

- name: Stage fry role defaults
  ansible.builtin.copy:
    dest: "{{ fry_roles_dir }}/fry/defaults/main.yml"
    content: |
      ---
      # Fry role defaults – overridden by user-data variables at launch time
      environment:  "{{ environment | default('staging') }}"
      project:      "{{ project | default('roadpass') }}"
      site_title:   "{{ (project | default('roadpass')) ~ ' EC2 App' }}"
      site_heading: "Welcome to {{ project | default('roadpass') }}"
      site_body:    "This nginx server was built with Packer and Ansible."
      nginx_html_dir: "/usr/share/nginx/html"
    owner: root
    group: root
    mode: "0644"
  tags: [pack, fry-stage]

- name: Stage fry role tasks
  ansible.builtin.copy:
    dest: "{{ fry_roles_dir }}/fry/tasks/main.yml"
    content: |
      ---
      # Fry role tasks – executed at EC2 launch time.
      # Variables are injected via EC2 user-data by the bootstrap script
      # using --extra-vars, overriding fry role defaults.

      - name: Render environment-specific index.html
        ansible.builtin.template:
          src: index.html.j2
          dest: "{{ nginx_html_dir }}/index.html"
          owner: root
          group: root
          mode: "0644"
        notify: reload nginx
        tags: [fry, nginx]
    owner: root
    group: root
    mode: "0644"
  tags: [pack, fry-stage]

- name: Stage fry role handlers
  ansible.builtin.copy:
    dest: "{{ fry_roles_dir }}/fry/handlers/main.yml"
    content: |
      ---
      - name: reload nginx
        ansible.builtin.systemd:
          name: nginx
          state: reloaded
    owner: root
    group: root
    mode: "0644"
  tags: [pack, fry-stage]

- name: Stage fry role index.html template
  ansible.builtin.template:
    src: index.html.j2
    dest: "{{ fry_roles_dir }}/fry/templates/index.html.j2"
    owner: root
    group: root
    mode: "0644"
  tags: [pack, fry-stage]

# ---------------------------------------------------------------------------
# 5. Install the user-data bootstrap / fry-runner systemd service
# ---------------------------------------------------------------------------

- name: Deploy fry bootstrap script
  ansible.builtin.template:
    src: fry-bootstrap.sh.j2
    dest: /usr/local/bin/fry-bootstrap.sh
    owner: root
    group: root
    mode: "0755"
  tags: [pack, fry-stage]

- name: Deploy fry systemd service unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/fry.service
    content: |
      [Unit]
      Description=Roadpass Fry – apply user-data configuration at launch
      After=network-online.target cloud-final.service
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/fry-bootstrap.sh
      RemainAfterExit=yes
      StandardOutput=journal
      StandardError=journal

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: "0644"
  tags: [pack, fry-stage]

- name: Enable fry service so it runs on first boot
  ansible.builtin.systemd:
    name: fry
    enabled: true
    daemon_reload: true
  tags: [pack, fry-stage]
